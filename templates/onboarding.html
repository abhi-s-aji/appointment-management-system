{% extends "base.html" %}
{% block content %}
<style>
    /* Premium Typography and Component Styling */
    .premium-card {
        background: #ffffff;
        border-radius: 24px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
        border: 1px solid #f1f5f9;
        overflow: hidden;
    }
    .premium-header {
        background: #0a192f; /* Deep Navy Medical Blue */
        padding: 40px;
        text-align: center;
        color: #ffffff;
    }
    .form-control, .form-select {
        border: 2px solid #e2e8f0 !important;
        border-radius: 12px !important;
        padding: 14px 20px !important;
        font-size: 0.95rem;
        transition: all 0.3s ease;
    }
    .form-control:focus {
        border-color: #2563eb !important;
        box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
    }
    .btn-premium {
        background: #2563eb;
        color: #fff;
        border-radius: 12px;
        padding: 16px;
        font-weight: 600;
        letter-spacing: 0.5px;
        transition: transform 0.2s, background 0.2s;
    }
    .btn-premium:hover { background: #1d4ed8; transform: translateY(-2px); }
</style>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="premium-card">
                <div class="premium-header">
                    <h2 class="fw-bold mb-2">Complete Profile</h2>
                    <p class="text-white-50 mb-0">Setting up your medical record at City Hospital</p>
                </div>
                <div class="p-4 p-md-5">
                    <form method="POST">
                        {% csrf_token %}
                        <div class="mb-4">
                            <label class="small fw-bold text-uppercase text-secondary mb-2">Full Name</label>
                            <input type="text" name="full_name" class="form-control" placeholder="Enter your full name" required>
                        </div>
                        <div class="row">
                            <div class="col-6 mb-4">
                                <label class="small fw-bold text-uppercase text-secondary mb-2">Age</label>
                                <input type="number" name="age" class="form-control" placeholder="25" required>
                            </div>
                            <div class="col-6 mb-4">
                                <label class="small fw-bold text-uppercase text-secondary mb-2">Gender</label>
                                <select name="gender" class="form-select">
                                    <option value="M">Male</option>
                                    <option value="F">Female</option>
                                </select>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="small fw-bold text-uppercase text-secondary mb-2">Phone Number</label>
                            <input type="text" name="phone" class="form-control" placeholder="+91 00000 00000" required>
                        </div>
                        <div class="mb-4">
                            <label class="small fw-bold text-uppercase text-secondary mb-2">Address</label>
                            <textarea name="address" class="form-control" rows="2" placeholder="Street, City, State"></textarea>
                        </div>
                        <div class="mb-4">
                            <label class="small fw-bold text-uppercase text-secondary mb-2">Emergency Contact</label>
                            <input type="text" name="emergency_contact" class="form-control" placeholder="Name and Number" required>
                        </div>
                        <button type="submit" class="btn btn-premium w-100">Save Profile & Continue</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
