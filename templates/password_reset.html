{% extends 'base.html' %}
{% block content %}
<div class="container d-flex justify-content-center align-items-center my-5" style="min-height: 75vh;">
    <div class="card border-0 shadow-lg p-4 p-sm-5 text-center w-100" style="max-width: 440px; border-radius: 28px; background: #ffffff;">
        <h3 class="fw-bold text-dark mb-2">Reset Password</h3>
        <p class="text-muted small mb-4">Enter your verified registration email address below to receive password recovery guidelines.</p>
        <form method="POST" action="" class="text-start d-flex flex-column gap-3">
            {% csrf_token %}
            <div class="form-group">
                <label class="form-label small fw-semibold text-secondary mb-1">Email address</label>
                <input type="email" name="email" class="form-control py-2.5" style="border-radius: 12px;" placeholder="name@example.com" required>
            </div>
            <button type="submit" class="btn btn-success text-white py-2.5 fw-semibold mt-2" style="border-radius: 24px; background-color: #10b981; border:0;">Send Recovery Link</button>
        </form>
    </div>
</div>
{% endblock %}
