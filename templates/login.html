{% extends "base.html" %}

{% block content %}
<div class="auth-wrapper" style="min-height: 80vh; display: flex; align-items: center; justify-content: center; background-color: #f4f7f6; padding: 40px 20px;">
    
    <div class="auth-card" style="width: 100%; max-width: 440px; background: #ffffff; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05); border: 1px solid #eef2f5; text-align: center;">
        
        <h2 style="font-size: 26px; font-weight: 700; color: #1e293b; margin-bottom: 8px;">Login to your account</h2>
        <p style="font-size: 14px; color: #64748b; margin-bottom: 32px; line-height: 1.5;">Access your dashboard to track locations.</p>
        
        {% load socialaccount %}
        <div style="margin-top: 20px;">
            <a href="{% url 'google_login' %}" 
               style="display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; padding: 14px; background-color: #ffffff; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 16px; font-weight: 600; color: #334155; text-decoration: none; transition: all 0.2s;"
               onmouseover="this.style.borderColor='#2563eb'; this.style.backgroundColor='#f8fafc'" 
               onmouseout="this.style.borderColor='#e2e8f0'; this.style.backgroundColor='#ffffff'">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l3.66-2.85z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.85c.87-2.6 3.3-4.53 12-4.53z" fill="#EA4335"/>
                </svg>
                Continue with Google
            </a>
        </div>
        
    </div>
</div>
{% endblock %}
