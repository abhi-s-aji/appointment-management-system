{% extends 'base.html' %}
{% block content %}
<div class="container d-flex justify-content-center align-items-center my-5" style="min-height: 75vh;">
    <div class="card border-0 shadow-lg p-4 p-sm-5 text-center w-100" style="max-width: 440px; border-radius: 28px; background: #ffffff;">
        <h3 class="fw-bold text-dark mb-3">Create Account</h3>
        <form method="POST" action="" class="text-start d-flex flex-column gap-3">
            {% csrf_token %}
            {% for field in form %}
                <div>
                    <label class="form-label small fw-semibold text-secondary mb-1">{{ field.label }}</label>
                    {{ field }}
                </div>
            {% endfor %}
            <button type="submit" class="btn btn-primary py-2.5 text-white fw-semibold mt-3" style="border-radius: 24px; background-color: #2563eb; border:0;">Register Account</button>
        </form>
        <p class="text-muted small mb-0 mt-4">Already have an account? <a href="{% url 'login' %}" class="text-primary text-decoration-none fw-semibold">Log In</a></p>
    </div>
</div>
{% endblock %}
